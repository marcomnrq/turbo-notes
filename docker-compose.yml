# Local dev environment for Turbo Notes.
#   docker compose up        -> db + backend + frontend
#   docker compose down      -> stop (add -v to wipe the db volume)
#
# Backend settings read DATABASE_URL; Next reads NEXT_PUBLIC_API_URL.
# Every value has a working default below, so `docker compose up` runs
# without a .env file. Override anything by creating a root .env.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turbonotes}
      POSTGRES_USER: ${POSTGRES_USER:-turbonotes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turbonotes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turbonotes} -d ${POSTGRES_DB:-turbonotes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-dev-only}
      DATABASE_URL: postgres://${POSTGRES_USER:-turbonotes}:${POSTGRES_PASSWORD:-turbonotes}@db:5432/${POSTGRES_DB:-turbonotes}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules   # anonymous volume: don't shadow container deps
      - /app/.next          # keep dev build cache out of the host bind mount
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
