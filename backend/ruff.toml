# Ruff config for the Turbo Notes backend.
# Linting/formatting only excludes generated migration files.

target-version = "py313"
line-length = 88
indent-width = 4

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line length handled by formatter
]

[lint.isort]
known-first-party = ["core", "users", "notes"]

[format]
exclude = ["*/migrations/*"]

[lint.per-file-ignores]
"*/migrations/*" = ["E", "W", "F", "I", "B", "UP"]
